<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VOID RUNNER AR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;touch-action:none}

/* Камера — фон */
#cam-video{
  position:fixed;inset:0;width:100%;height:100%;
  object-fit:cover;z-index:0;
  transform:scaleX(-1); /* selfie-фикс для front cam */
}
#cam-video.rear{transform:none}

/* Основной canvas для AR объектов */
#ar-canvas{
  position:fixed;inset:0;width:100%;height:100%;
  z-index:10;pointer-events:none;
}

/* ── HUD ── */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:12px 16px;pointer-events:none;
  background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);
}
.hp{
  background:rgba(0,0,0,.75);border:1px solid #00e6ff;
  border-radius:8px;padding:6px 14px;text-align:center;
  box-shadow:0 0 12px rgba(0,230,255,.3);
  min-width:72px;
}
.hl{font-size:8px;letter-spacing:3px;color:rgba(0,230,255,.5);text-transform:uppercase}
.hv{font-size:22px;font-weight:bold;color:#00e6ff;line-height:1.15}
#ht .hv{color:#ff8c00}
#hlv .hv{font-size:16px;color:#ff3366}

/* ── Прицел ── */
#xhair{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:64px;height:64px;z-index:200;pointer-events:none;
  display:none;
}
.xh-ring{
  position:absolute;inset:0;border-radius:50%;
  border:2px solid rgba(0,230,255,.7);
  transition:border-color .1s;
}
.xh-dot{
  position:absolute;top:50%;left:50%;
  width:6px;height:6px;border-radius:50%;
  background:#00e6ff;
  transform:translate(-50%,-50%);
  box-shadow:0 0 8px #00e6ff;
}
.xh-line{position:absolute;background:rgba(0,230,255,.8)}
.xh-v{width:1px;height:18px;left:50%;top:4px;transform:translateX(-50%)}
.xh-v2{width:1px;height:18px;left:50%;bottom:4px;transform:translateX(-50%)}
.xh-h{height:1px;width:18px;top:50%;left:4px;transform:translateY(-50%)}
.xh-h2{height:1px;width:18px;top:50%;right:4px;transform:translateY(-50%)}
#xhair.hit .xh-ring{border-color:#ffdd00}
#xhair.hit .xh-dot{background:#ffdd00;box-shadow:0 0 12px #ffdd00}
#xhair.miss .xh-ring{border-color:rgba(255,80,80,.8)}

/* ── Кнопка выстрела ── */
#shoot-btn{
  position:fixed;bottom:36px;left:50%;transform:translateX(-50%);
  z-index:200;
  width:86px;height:86px;border-radius:50%;
  background:rgba(0,0,0,.6);border:2.5px solid #00e6ff;
  color:#00e6ff;font-size:30px;
  display:none;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  box-shadow:0 0 24px rgba(0,230,255,.4),inset 0 0 20px rgba(0,230,255,.1);
  transition:all .12s;
  user-select:none;
}
#shoot-btn:active{
  background:rgba(0,230,255,.35);
  transform:translateX(-50%) scale(0.9);
  box-shadow:0 0 40px rgba(0,230,255,.7);
}

/* ── Popup ── */
#popup{
  position:fixed;top:38%;left:50%;transform:translateX(-50%);
  z-index:200;font-size:34px;font-weight:bold;
  pointer-events:none;opacity:0;
  transition:opacity .15s;
  text-shadow:0 0 16px currentColor;white-space:nowrap;
  letter-spacing:2px;
}

/* ── GPS / статус ── */
#status-bar{
  position:fixed;bottom:140px;left:50%;transform:translateX(-50%);
  z-index:200;font-size:10px;letter-spacing:2px;
  color:rgba(0,230,255,.6);background:rgba(0,0,0,.75);
  border:1px solid rgba(0,230,255,.3);border-radius:6px;
  padding:6px 16px;pointer-events:none;text-align:center;
  white-space:nowrap;
}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;
     background:#ff3366;margin-right:6px;vertical-align:middle;
     animation:blink 1s ease-in-out infinite}
.dot.ok{background:#00ff88;animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── Радар ── */
#radar{
  position:fixed;bottom:140px;right:16px;z-index:200;
  width:96px;height:96px;border-radius:50%;
  border:1.5px solid rgba(0,230,255,.6);
  background:rgba(0,0,0,.7);
  display:none;overflow:visible;
  box-shadow:0 0 16px rgba(0,230,255,.25);
}
#radar canvas{border-radius:50%}

/* ── Оверлей ── */
#overlay{
  position:fixed;inset:0;z-index:1000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  background:radial-gradient(ellipse at 50% 35%,rgba(0,6,24,.97),#000 80%);
  padding:24px;
}
.ot{
  font-size:clamp(32px,9vw,64px);font-weight:900;color:#00e6ff;
  letter-spacing:5px;text-shadow:0 0 30px #00e6ff;
  animation:glow 2s ease-in-out infinite;text-align:center;
  line-height:1;
}
.os{font-size:10px;letter-spacing:5px;color:rgba(0,230,255,.3);text-align:center}
.oi{
  font-size:12px;line-height:2;text-align:center;
  color:rgba(255,255,255,.45);max-width:300px;
}
.oi b{color:rgba(0,230,255,.9);font-weight:normal}
.of{font-size:56px;font-weight:900;color:#ffdd00;text-shadow:0 0 24px #ffdd00;display:none;text-align:center}
.ob{
  font-family:'Courier New',monospace;font-size:13px;font-weight:bold;letter-spacing:3px;
  color:#000;background:#00e6ff;border:none;padding:14px 40px;border-radius:40px;
  cursor:pointer;box-shadow:0 0 28px rgba(0,230,255,.6);transition:all .18s;
  pointer-events:all;margin-top:8px;-webkit-tap-highlight-color:transparent;
}
.ob:active{transform:scale(0.93)}
#perm-err{
  font-size:11px;color:#ff7777;text-align:center;
  max-width:300px;display:none;line-height:1.7;
  background:rgba(255,50,50,.1);border:1px solid rgba(255,80,80,.3);
  border-radius:8px;padding:10px 14px;
}
@keyframes glow{
  0%,100%{text-shadow:0 0 30px #00e6ff}
  50%{text-shadow:0 0 60px #00e6ff,0 0 100px rgba(0,230,255,.4)}
}
</style>
</head>
<body>

<!-- Видео камеры -->
<video id="cam-video" autoplay playsinline muted></video>

<!-- AR Canvas (рисуем 3D объекты вручную) -->
<canvas id="ar-canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hp"><div class="hl">SCORE</div><div class="hv" id="hv-s">0</div></div>
  <div class="hp" id="ht"><div class="hl">TIME</div><div class="hv" id="hv-t">60</div></div>
  <div class="hp" id="hlv"><div class="hl">LIVES</div><div class="hv" id="hv-l">❤❤❤</div></div>
</div>

<!-- Прицел -->
<div id="xhair">
  <div class="xh-ring"></div>
  <div class="xh-dot"></div>
  <div class="xh-line xh-v"></div>
  <div class="xh-line xh-v2"></div>
  <div class="xh-line xh-h"></div>
  <div class="xh-line xh-h2"></div>
</div>

<div id="popup"></div>

<!-- Статус -->
<div id="status-bar"><span class="dot"></span>Нажми ЗАПУСТИТЬ AR</div>

<!-- Радар -->
<div id="radar"><canvas id="radar-canvas" width="96" height="96"></canvas></div>

<!-- Кнопка -->
<div id="shoot-btn" onclick="shoot()">🎯</div>

<!-- Оверлей -->
<div id="overlay">
  <div class="ot" id="ov-title">VOID RUNNER</div>
  <div class="os" id="ov-sub">AR CRYSTAL HUNT</div>
  <div class="of" id="ov-final"></div>
  <div class="oi" id="ov-instr">
    <b>Как играть:</b><br>
    Крути телефон — ищи <b>💎 кристаллы</b><br>
    Наведи прицел → нажми 🎯<br><br>
    Не стреляй в <b>🔴 красные бомбы</b><br><br>
    Нужен: <b>Chrome + камера</b>
  </div>
  <div id="perm-err"></div>
  <button class="ob" id="ov-btn" onclick="handleStart()">▶ ЗАПУСТИТЬ AR</button>
</div>

<script>
// ═══════════════════════════════════════════
//  VOID RUNNER AR — чистая реализация без A-Frame
//  Камера как фон + Canvas-рендер объектов
// ═══════════════════════════════════════════

// ── AUDIO ──
let AC;
function initAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)()}
function tone(f,t,d,v,dl){
  if(!AC)return;dl=dl||0;v=v||.28;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=t;o.frequency.value=f;
  const now=AC.currentTime+dl;
  g.gain.setValueAtTime(v,now);
  g.gain.exponentialRampToValueAtTime(.001,now+d);
  o.start(now);o.stop(now+d);
}
function sfxGem(){tone(523,'sine',.07,.45);tone(659,'sine',.08,.45,.065);tone(880,'sine',.11,.45,.13)}
function sfxBomb(){tone(160,'sawtooth',.28,.5);tone(80,'square',.35,.45,.09)}
function sfxEnd(){[360,290,230,170].forEach((f,i)=>tone(f,'sine',.4,.4,i*.19))}
function sfxCombo(){[659,784,1047].forEach((f,i)=>tone(f,'sine',.1,.5,i*.07))}

// ── STATE ──
let score=0,lives=3,timeLeft=60,combo=0,comboTmr;
let active=false,timerInt,renderLoop;
let arItems=[];
let lastShotAt=0;
let deviceYaw=0,devicePitch=0; // углы устройства
let smoothYaw=0,smoothPitch=0;
let hasOrientation=false;

// Камера
let videoStream=null;

function $id(id){return document.getElementById(id)}
function rnd(a,b){return a+Math.random()*(b-a)}

function updateHUD(){
  $id('hv-s').textContent=score;
  $id('hv-t').textContent=timeLeft;
  $id('hv-l').textContent='❤'.repeat(Math.max(0,lives))+'🖤'.repeat(Math.max(0,3-lives));
}

function popup(msg,col){
  const el=$id('popup');
  el.textContent=msg;el.style.color=col||'#ffdd00';el.style.opacity='1';
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',900);
}

function flashHair(type){
  const h=$id('xhair');
  h.classList.remove('hit','miss');
  h.classList.add(type);
  setTimeout(()=>h.classList.remove(type),220);
}

function setStatus(msg,ok){
  const left=arItems.filter(i=>!i.collected).length;
  const suffix=left?(' | цели: '+left):'';
  $id('status-bar').innerHTML='<span class="dot'+(ok?' ok':'')+'"></span>'+msg+suffix;
}

// ── ОРИЕНТАЦИЯ УСТРОЙСТВА ──
function initOrientation(){
  let lastAlpha=null;
  function handler(e){
    hasOrientation=true;
    let alpha=e.alpha||0;
    let beta=e.beta||0;
    // Абсолютный компас или относительный
    if(typeof e.webkitCompassHeading==='number'){
      alpha=e.webkitCompassHeading;
    }else{
      // alpha в DeviceOrientation = азимут против часовой, нам нужно по часовой
      alpha=(360-alpha)%360;
    }
    // Сглаживание резких скачков (например, переход 359→0)
    if(lastAlpha!==null){
      let diff=alpha-lastAlpha;
      if(diff>180)diff-=360;
      if(diff<-180)diff+=360;
      deviceYaw=lastAlpha+diff;
    }else{
      deviceYaw=alpha;
    }
    lastAlpha=deviceYaw;
    devicePitch=beta; // наклон -180..180
  }
  // Попробуем абсолютный, потом обычный
  window.addEventListener('deviceorientationabsolute',handler,true);
  window.addEventListener('deviceorientation',handler,true);
}

// ── РАЗМЕЩЕНИЕ AR ОБЪЕКТОВ ──
// Объекты размещаются в "угловом" пространстве вокруг игрока.
// yaw — угол по горизонтали (0-360), pitch — по вертикали.
function placeARItems(){
  arItems=[];
  const COLS=['#00e6ff','#aaff00','#ff44cc','#ffdd00','#00ffaa','#ff8800'];

  const configs=[
    {type:'gem', yaw:10,  pitch:0},
    {type:'gem', yaw:60,  pitch:5},
    {type:'gem', yaw:120, pitch:-5},
    {type:'gem', yaw:180, pitch:3},
    {type:'gem', yaw:240, pitch:-3},
    {type:'gem', yaw:300, pitch:6},
    {type:'bomb',yaw:80,  pitch:0},
    {type:'bomb',yaw:200, pitch:4},
  ];

  configs.forEach((cfg,i)=>{
    const col=COLS[i%COLS.length];
    // Начальный азимут = текущее направление + смещение
    const baseYaw=(deviceYaw+cfg.yaw)%360;
    arItems.push({
      type:cfg.type,
      yaw:baseYaw,
      pitch:cfg.pitch+rnd(-4,4),
      dist:rnd(4,10),         // условная дистанция (для размера и радара)
      col:cfg.type==='bomb'?'#cc2200':col,
      collected:false,
      spawnTime:Date.now(),
      id:i,
      // анимация покачивания
      floatOffset:rnd(0,Math.PI*2),
      floatSpeed:rnd(0.7,1.3),
    });
  });

  $id('radar').style.display='block';
  setStatus('AR активен — крути телефон!',true);
}

// ── РЕНДЕР ──
const canvas=$id('ar-canvas');
const ctx=canvas.getContext('2d');

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
window.addEventListener('resize',resize);
resize();

// Перевести угловые координаты объекта в пиксели на экране
// FOV горизонтальный ~70°, вертикальный ~50°
const HFOV=70; // degrees
const VFOV=50;

function worldToScreen(objYaw,objPitch){
  const W=canvas.width, H=canvas.height;

  // Разница углов
  let dYaw=objYaw-smoothYaw;
  // Нормализуем в [-180,180]
  dYaw=((dYaw+540)%360)-180;
  const dPitch=objPitch-smoothPitch;

  const x=W/2 + (dYaw/HFOV)*W;
  const y=H/2 - (dPitch/VFOV)*H;
  return {x,y,dYaw,dPitch};
}

function isVisible(dYaw,dPitch){
  return Math.abs(dYaw)<HFOV*0.62 && Math.abs(dPitch)<VFOV*0.62;
}

function drawCrystal(x,y,size,col,t,isBomb,alpha){
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.translate(x,y);

  const rot=t*0.8+(isBomb?t*0.5:0);
  ctx.rotate(rot);

  if(isBomb){
    // Рисуем бомбу — сфера
    const grad=ctx.createRadialGradient(-size*.25,-size*.25,size*.05,0,0,size);
    grad.addColorStop(0,'#ff8888');
    grad.addColorStop(0.5,'#cc2200');
    grad.addColorStop(1,'#660000');
    ctx.beginPath();
    ctx.arc(0,0,size,0,Math.PI*2);
    ctx.fillStyle=grad;
    ctx.fill();
    // Глоу
    ctx.shadowColor='#ff2200';
    ctx.shadowBlur=size*1.4;
    ctx.beginPath();
    ctx.arc(0,0,size*.85,0,Math.PI*2);
    ctx.fillStyle='rgba(255,50,0,.18)';
    ctx.fill();
    ctx.shadowBlur=0;
    // Фитиль
    ctx.strokeStyle='#888';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,-size);ctx.quadraticCurveTo(size*.5,-size*1.6,size*.3,-size*2.0);ctx.stroke();
    // Искра
    ctx.fillStyle='#ffdd00';
    ctx.beginPath();ctx.arc(size*.3,-size*2.0,3,0,Math.PI*2);ctx.fill();
  } else {
    // Кристалл — октаэдр (2D проекция)
    const pulse=1+Math.sin(t*2+Math.PI)*0.12;
    const s=size*pulse;
    ctx.shadowColor=col;
    ctx.shadowBlur=s*1.5;

    // Внешний ромб
    ctx.beginPath();
    ctx.moveTo(0,-s*1.2);
    ctx.lineTo(s*.65,-s*.4);
    ctx.lineTo(s*.5, s*.8);
    ctx.lineTo(0, s*.55);
    ctx.lineTo(-s*.5,s*.8);
    ctx.lineTo(-s*.65,-s*.4);
    ctx.closePath();

    const grad=ctx.createLinearGradient(0,-s*1.2,0,s*.8);
    grad.addColorStop(0,'#ffffff');
    grad.addColorStop(0.2,col);
    grad.addColorStop(0.7,col+'99');
    grad.addColorStop(1,'#000033');
    ctx.fillStyle=grad;
    ctx.fill();

    // Грани внутри
    ctx.strokeStyle='rgba(255,255,255,.35)';
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,-s*1.2);ctx.lineTo(0,s*.55);ctx.stroke();
    ctx.beginPath();ctx.moveTo(s*.65,-s*.4);ctx.lineTo(-s*.65,-s*.4);ctx.stroke();

    // Блик
    ctx.fillStyle='rgba(255,255,255,.55)';
    ctx.beginPath();
    ctx.moveTo(-s*.18,-s*.85);
    ctx.lineTo(s*.08,-s*.75);
    ctx.lineTo(-s*.08,-s*.35);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur=0;

    // Кольцо вокруг
    ctx.rotate(-rot*0.6);
    ctx.beginPath();
    ctx.ellipse(0,0,s*1.4,s*.45,0,0,Math.PI*2);
    ctx.strokeStyle=col+'88';
    ctx.lineWidth=1.5;
    ctx.stroke();
  }

  ctx.restore();
}

// Стрелки-подсказки для объектов за экраном
function drawArrow(dYaw,dPitch,col,isBomb){
  const W=canvas.width,H=canvas.height;
  const cx=W/2,cy=H/2;
  const angle=Math.atan2(-dPitch,dYaw);
  const r=Math.min(W,H)*0.42;
  const ax=cx+Math.cos(angle)*r;
  const ay=cy+Math.sin(angle)*r;

  ctx.save();
  ctx.translate(ax,ay);
  ctx.rotate(angle+Math.PI/2);
  ctx.fillStyle=isBomb?'#ff4400':(col+'cc');
  ctx.shadowColor=isBomb?'#ff2200':col;
  ctx.shadowBlur=8;
  ctx.beginPath();
  ctx.moveTo(0,-12);ctx.lineTo(7,6);ctx.lineTo(-7,6);ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function renderAR(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!active)return;

  const t=Date.now()/1000;

  // Плавное сглаживание углов камеры
  let yawDiff=deviceYaw-smoothYaw;
  yawDiff=((yawDiff+540)%360)-180;
  smoothYaw+=yawDiff*0.18;
  smoothPitch+=(devicePitch-smoothPitch)*0.18;

  arItems.forEach(item=>{
    if(item.collected)return;

    // Покачивание
    const floatPitch=Math.sin(t*item.floatSpeed+item.floatOffset)*1.5;
    const {x,y,dYaw,dPitch}=worldToScreen(item.yaw,item.pitch+floatPitch);
    const size=Math.max(16,52/item.dist*5);

    if(isVisible(dYaw,dPitch)){
      const age=Math.min(1,(t-item.spawnTime/1000)*2);
      drawCrystal(x,y,size,item.col,t,item.type==='bomb',age);

      // Подпись дистанции
      ctx.save();
      ctx.font='bold 10px Courier New';
      ctx.fillStyle='rgba(255,255,255,.5)';
      ctx.textAlign='center';
      ctx.fillText(item.type==='bomb'?'💣 BOMB':'💎',x,y+size+16);
      ctx.restore();
    } else {
      // Стрелка
      drawArrow(dYaw,dPitch,item.col,item.type==='bomb');
    }
  });

  drawRadar(t);
}

// ── РАДАР ──
function drawRadar(t){
  const rc=document.getElementById('radar-canvas');
  if(!rc)return;
  const c=rc.getContext('2d');
  const W=96,H=96,cx=48,cy=48,r=44;
  c.clearRect(0,0,W,H);

  // Фон
  c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);
  c.fillStyle='rgba(0,8,24,.82)';c.fill();

  // Сетка
  [15,28,44].forEach(gr=>{
    c.beginPath();c.arc(cx,cy,gr,0,Math.PI*2);
    c.strokeStyle='rgba(0,230,255,.15)';c.lineWidth=.7;c.stroke();
  });
  c.strokeStyle='rgba(0,230,255,.12)';c.lineWidth=.7;
  [0,Math.PI/2,Math.PI,3*Math.PI/2].forEach(a=>{
    c.beginPath();c.moveTo(cx,cy);
    c.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);c.stroke();
  });

  // Направление
  c.beginPath();c.moveTo(cx,cy);c.lineTo(cx,cy-r+5);
  c.strokeStyle='rgba(0,230,255,.7)';c.lineWidth=1.5;c.stroke();
  // Треугольник направления
  c.fillStyle='#00e6ff';
  c.beginPath();c.moveTo(cx,cy-r+2);c.lineTo(cx-3,cy-r+9);c.lineTo(cx+3,cy-r+9);c.closePath();c.fill();

  // Игрок
  c.beginPath();c.arc(cx,cy,4,0,Math.PI*2);
  c.fillStyle='#00e6ff';c.fill();
  c.strokeStyle='rgba(0,230,255,.5)';c.lineWidth=1;c.stroke();

  // Объекты
  arItems.filter(i=>!i.collected).forEach(item=>{
    let dYaw=item.yaw-smoothYaw;
    dYaw=((dYaw+540)%360)-180;
    const dPitch=item.pitch-smoothPitch;
    // Конвертируем в радарные координаты
    const scale=r/(HFOV*1.8);
    const px=cx+dYaw*scale;
    const py=cy-dPitch*scale;
    if(px>3&&px<W-3&&py>3&&py<H-3){
      // Пульсация
      const pulse=t?0.5+Math.sin(t*3+item.id)*0.5:1;
      c.beginPath();c.arc(px,py,3+pulse,0,Math.PI*2);
      c.fillStyle=item.type==='bomb'?'#ff4400':'#ffdd00';
      c.fill();
    }
  });

  // Скан-линия
  if(t){
    const scanAngle=(t*1.2)%(Math.PI*2);
    const grad=c.createConicalGradient?null:null;
    c.save();
    c.translate(cx,cy);
    c.rotate(scanAngle);
    const g=c.createLinearGradient(0,0,0,-r);
    g.addColorStop(0,'rgba(0,230,255,.4)');
    g.addColorStop(1,'rgba(0,230,255,0)');
    c.beginPath();c.moveTo(0,0);c.lineTo(0,-r);
    c.strokeStyle=g;c.lineWidth=8;c.stroke();
    c.restore();
  }

  // Бордер
  c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);
  c.strokeStyle='rgba(0,230,255,.55)';c.lineWidth=1.8;c.stroke();
}

// ── ВЫСТРЕЛ ──
function shoot(){
  if(!active)return;
  const now=Date.now();
  if(now-lastShotAt<200)return;
  lastShotAt=now;
  initAC();

  const W=canvas.width,H=canvas.height;
  const CX=W/2,CY=H/2;
  const THRESHOLD=72; // px от центра до попадания

  let bestItem=null,bestDist=Infinity;

  arItems.forEach(item=>{
    if(item.collected)return;
    const floatPitch=Math.sin(Date.now()/1000*item.floatSpeed+item.floatOffset)*1.5;
    const {x,y,dYaw,dPitch}=worldToScreen(item.yaw,item.pitch+floatPitch);
    if(!isVisible(dYaw,dPitch))return;
    const d=Math.hypot(x-CX,y-CY);
    if(d<THRESHOLD&&d<bestDist){bestDist=d;bestItem=item;}
  });

  if(bestItem){
    collectItem(bestItem);
  } else {
    flashHair('miss');
    popup('МИМО','rgba(255,100,100,.8)');
  }
}

function collectItem(item){
  if(item.collected)return;
  item.collected=true;

  if(item.type==='gem'){
    sfxGem(); combo++;
    clearTimeout(comboTmr);
    comboTmr=setTimeout(()=>{combo=0;},1500);
    const pts=10*Math.max(1,combo); score+=pts;
    if(combo>=3){sfxCombo();popup('COMBO ×'+combo+'!','#aaff00')}
    else popup('+'+pts,'#ffdd00');
    flashHair('hit');
  } else {
    sfxBomb(); combo=0; lives--;
    popup('💥 БОМБА!','#ff3366');
    flashHair('miss');
  }

  updateHUD();

  const left=arItems.filter(i=>!i.collected).length;
  setStatus('AR активен',true);
  if(left===0){
    popup('ВСЕ СОБРАНЫ! ✨','#aaff00');
    setTimeout(()=>{if(active)placeARItems();},1400);
  }
  if(lives<=0)endGame('НЕТ ЖИЗНЕЙ');
}

// ── КАМЕРА ──
async function startCamera(){
  const video=$id('cam-video');
  try{
    // Предпочитаем заднюю камеру
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},
      audio:false
    });
    videoStream=stream;
    video.srcObject=stream;
    video.classList.add('rear');
    await video.play();
    return true;
  }catch(e){
    console.error('Camera error:',e);
    return false;
  }
}

function stopCamera(){
  if(videoStream){videoStream.getTracks().forEach(t=>t.stop());videoStream=null;}
}

// ── ЗАПУСК ──
async function handleStart(){
  initAC();
  $id('perm-err').style.display='none';

  if(!window.isSecureContext){
    $id('perm-err').textContent='⚠ Нужен HTTPS для доступа к камере. Открой через https://';
    $id('perm-err').style.display='block';
    return;
  }
  if(!navigator.mediaDevices?.getUserMedia){
    $id('perm-err').textContent='⚠ Браузер не поддерживает камеру. Используй Chrome на Android/iOS.';
    $id('perm-err').style.display='block';
    return;
  }

  // iOS: запрос разрешения на ориентацию
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    try{
      const res=await DeviceOrientationEvent.requestPermission();
      if(res!=='granted'){
        $id('perm-err').textContent='⚠ Разреши доступ к гироскопу в Safari → Настройки сайта → Motion & Orientation.';
        $id('perm-err').style.display='block';
      }
    }catch(_){}
  }

  const camOk=await startCamera();
  if(!camOk){
    $id('perm-err').textContent='⚠ Камера недоступна. Разреши доступ: Настройки → Браузер → Камера, затем перезагрузи страницу.';
    $id('perm-err').style.display='block';
    return;
  }

  startGame();
}

function startGame(){
  resetRound();
  score=0;lives=3;timeLeft=60;combo=0;active=true;
  $id('overlay').style.display='none';
  $id('xhair').style.display='block';
  $id('shoot-btn').style.display='flex';
  $id('ht').querySelector('.hv').style.color='#ff8c00';
  updateHUD();

  // Если нет гироскопа — используем "ленивый" режим (объекты всегда видны)
  if(!hasOrientation){
    setStatus('Без гироскопа — объекты перед вами',true);
    // Фиксируем все объекты по центру экрана с разбросом
    setTimeout(()=>{
      arItems.forEach((item,i)=>{
        item.yaw=deviceYaw+rnd(-25,25);
        item.pitch=rnd(-12,12);
      });
    },300);
  }

  placeARItems();

  if(renderLoop)cancelAnimationFrame(renderLoop);
  function loop(){renderAR();renderLoop=requestAnimationFrame(loop);}
  loop();

  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    if(!active)return;
    timeLeft--;
    if(timeLeft<=10)$id('ht').querySelector('.hv').style.color='#ff3366';
    updateHUD();
    if(timeLeft<=0)endGame('ВРЕМЯ ВЫШЛО');
  },1000);
}

function endGame(reason){
  active=false;clearInterval(timerInt);sfxEnd();
  if(renderLoop){cancelAnimationFrame(renderLoop);renderLoop=null;}
  $id('xhair').style.display='none';
  $id('shoot-btn').style.display='none';
  $id('ov-title').textContent='GAME OVER';
  $id('ov-sub').textContent=reason;
  const f=$id('ov-final');f.textContent=score+' PTS';f.style.display='block';
  $id('ov-instr').style.display='none';
  $id('ov-btn').textContent='↺ СНОВА';
  $id('overlay').style.display='flex';
  // Камеру НЕ останавливаем — для перезапуска
}

function resetRound(){
  arItems=[];
  clearInterval(timerInt);
  if(renderLoop){cancelAnimationFrame(renderLoop);renderLoop=null;}
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

// ── ИНИЦИАЛИЗАЦИЯ ──
document.addEventListener('DOMContentLoaded',()=>{
  initOrientation();

  // Тап по canvas тоже стреляет
  canvas.addEventListener('click',shoot);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();shoot();},{passive:false});

  // Кнопка стрелять
  $id('shoot-btn').addEventListener('touchstart',e=>{e.preventDefault();shoot();},{passive:false});

  document.addEventListener('contextmenu',e=>e.preventDefault());

  window.addEventListener('beforeunload',()=>{
    stopCamera();
    clearInterval(timerInt);
    if(renderLoop)cancelAnimationFrame(renderLoop);
  });

  // Ничего не запускаем автоматически — ждём нажатия кнопки
});
</script>
